<div class="catalog-page">

  <!-- Barra de acciones -->
  <div class="catalog-page__toolbar">

    <div class="catalog-page__filters">
      <!-- Búsqueda -->
      <mat-form-field appearance="outline" class="filter-field filter-field--search">
        <mat-label>Buscar categoría</mat-label>
        <input matInput [formControl]="searchCtrl" autocomplete="off" />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </div>

    <div class="catalog-page__actions">
      @if (canWrite()) {
        <button mat-flat-button color="primary" (click)="openNew()">
          <mat-icon>add</mat-icon>
          Nueva categoría
        </button>
      }
    </div>
  </div>

  <!-- Progress bar de carga -->
  @if (loading) {
    <mat-progress-bar mode="indeterminate" class="catalog-page__progress" />
  }

  <!-- Tabla full-width -->
  @if (!loading && categories.length === 0) {
    <div class="catalog-page__empty">
      <app-empty-state [variant]="searchCtrl.value ? 'no-results' : 'empty'" />
    </div>
  } @else {
    <div class="catalog-page__table-wrapper">
      <table mat-table [dataSource]="categories" class="catalog-table">

        <!-- Nombre -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let row" class="cell-name">{{ row.name }}</td>
        </ng-container>

        <!-- Descripción -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Descripción</th>
          <td mat-cell *matCellDef="let row" class="cell-truncate"
              [matTooltip]="row.description" matTooltipShowDelay="300">
            {{ row.description }}
          </td>
        </ng-container>

        <!-- Acciones -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row" class="cell-actions">
            <button mat-icon-button
                    (click)="viewProducts(row.id); $event.stopPropagation()"
                    matTooltip="Ver productos de esta categoría"
                    matTooltipShowDelay="300"
                    aria-label="Ver productos de {{ row.name }}">
              <mat-icon>shopping_bag</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            class="catalog-row"
            [class.catalog-row--clickable]="canWrite()"
            (click)="onRowClick(row)">
        </tr>
      </table>

      @if (page) {
        <mat-paginator
          [length]="page.totalElements"
          [pageSize]="pageSize"
          [pageIndex]="currentPage"
          [pageSizeOptions]="[10, 20, 50]"
          (page)="onPageChange($event)"
          aria-label="Paginación de categorías" />
      }
    </div>
  }

</div>
