<div class="catalog-page">

  <!-- Barra de acciones -->
  <div class="catalog-page__toolbar">
    <h2 class="catalog-page__title">Categorías</h2>

    <div class="catalog-page__actions">
      <!-- Búsqueda -->
      <mat-form-field appearance="outline" class="catalog-page__search">
        <mat-icon matPrefix>search</mat-icon>
        <input matInput [formControl]="searchCtrl" placeholder="Buscar categoría…" />
        @if (searchCtrl.value) {
          <button matSuffix mat-icon-button aria-label="Limpiar búsqueda" (click)="clearSearch()">
            <mat-icon>close</mat-icon>
          </button>
        }
      </mat-form-field>

      <!-- Acceso cruzado: ir a Productos -->
      <button mat-stroked-button
              (click)="viewProducts()"
              matTooltip="Ir a catálogo de productos" matTooltipShowDelay="300">
        <mat-icon>shopping_bag</mat-icon>
        Productos
      </button>

      @if (canWrite()) {
        <button mat-flat-button color="primary" (click)="openNew()">
          <mat-icon>add</mat-icon>
          Nueva categoría
        </button>
      }
    </div>
  </div>

  <!-- Progress bar de carga -->
  @if (loading) {
    <mat-progress-bar mode="indeterminate" class="catalog-page__progress" />
  }

  <!-- Tabla full-width -->
  @if (!loading && categories.length === 0) {
    <div class="catalog-page__empty">
      <app-empty-state [variant]="searchCtrl.value ? 'no-results' : 'empty'" />
    </div>
  } @else {
    <div class="catalog-page__table-wrapper">
      <table mat-table [dataSource]="categories" class="catalog-table">

        <!-- Nombre -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let row" class="cell-name">{{ row.name }}</td>
        </ng-container>

        <!-- Descripción -->
        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef>Descripción</th>
          <td mat-cell *matCellDef="let row" class="cell-truncate"
              [matTooltip]="row.description" matTooltipShowDelay="300">
            {{ row.description }}
          </td>
        </ng-container>

        <!-- Creado por -->
        <ng-container matColumnDef="createdByUsername">
          <th mat-header-cell *matHeaderCellDef>Creado por</th>
          <td mat-cell *matCellDef="let row">{{ row.createdByUsername }}</td>
        </ng-container>

        <!-- Acciones -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef></th>
          <td mat-cell *matCellDef="let row" class="cell-actions">
            <!-- Acceso cruzado: ver productos de esta categoría -->
            <button mat-icon-button
                    (click)="viewProducts(row.id); $event.stopPropagation()"
                    matTooltip="Ver productos de esta categoría"
                    matTooltipShowDelay="300"
                    aria-label="Ver productos de {{ row.name }}">
              <mat-icon>shopping_bag</mat-icon>
            </button>

            <button mat-icon-button
                    (click)="openEdit(row); $event.stopPropagation()"
                    matTooltip="Editar categoría" matTooltipShowDelay="300"
                    aria-label="Editar {{ row.name }}">
              <mat-icon>edit</mat-icon>
            </button>

            @if (canWrite()) {
              <button mat-icon-button color="warn"
                      (click)="confirmDelete(row); $event.stopPropagation()"
                      matTooltip="Desactivar" matTooltipShowDelay="300"
                      aria-label="Desactivar categoría {{ row.name }}">
                <mat-icon>delete_outline</mat-icon>
              </button>
            }
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"
            class="catalog-row"
            (click)="openEdit(row)">
        </tr>
      </table>

      @if (page) {
        <mat-paginator
          [length]="page.totalElements"
          [pageSize]="pageSize"
          [pageIndex]="currentPage"
          [pageSizeOptions]="[10, 20, 50]"
          (page)="onPageChange($event)"
          aria-label="Paginación de categorías" />
      }
    </div>
  }

</div>
