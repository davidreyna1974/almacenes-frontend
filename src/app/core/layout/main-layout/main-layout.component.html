<a class="skip-link" href="#main-content">Ir al contenido principal</a>

<div class="layout-wrapper">

  <app-topbar></app-topbar>

  <mat-sidenav-container class="layout-body">

    <mat-sidenav
      mode="side"
      opened
      [style.width]="(collapsed$ | async) ? 'var(--sidebar-width-collapsed)' : 'var(--sidebar-width-expanded)'"
    >
      <app-sidebar></app-sidebar>
    </mat-sidenav>

    <mat-sidenav-content>
      <main id="main-content" class="layout-content">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>

  </mat-sidenav-container>

</div>
