name: CD — Publicar imagen (Frontend)
# Entrega Continua (Continuous DELIVERY): al llegar a main, construye la imagen
# Docker (Angular compilado + nginx) y la PUBLICA en GHCR. NO despliega.
# La imagen usa envsubst para ${DOMAIN} en tiempo de EJECUCIÓN, así que construirla
# NO requiere el dominio (build agnóstico del dominio).
# Brecha 1 (CI/CD) — ver docs/planificacion/plan_implementacion_CI_CD_almacenes.txt
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  packages: write
jobs:
  image:
    name: Build & Push image (GHCR)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Login a GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Calcular tags (por SHA + latest)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/davidreyna1974/almacenes-frontend
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
