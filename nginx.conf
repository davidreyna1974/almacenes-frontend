# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    # Certificados Let's Encrypt (montados como volumen en docker-compose.yml).
    # ${DOMAIN} lo inyecta envsubst al arrancar el contenedor (ver Dockerfile:
    # /etc/nginx/templates + NGINX_ENVSUBST_FILTER=DOMAIN). Solo se sustituye
    # ${DOMAIN}; las variables de nginx ($host, $uri, etc.) quedan intactas.
    ssl_certificate     /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    # Protocolos y cifrados modernos (TLS 1.2 mínimo, preferir 1.3)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    root /usr/share/nginx/html;
    index index.html;

    # Seguridad: ocultar versión de nginx
    server_tokens off;

    # Headers de seguridad
    add_header X-Content-Type-Options  "nosniff"                        always;
    add_header X-Frame-Options         "DENY"                           always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Proxy al backend Spring Boot para rutas de API
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Assets estáticos: cache largo (tienen hash en el nombre)
    location ~* \.(js|css|woff2?|ttf|ico|png|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing: todas las rutas devuelven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
