server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Seguridad: ocultar versión de nginx
    server_tokens off;

    # Headers de seguridad
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Compresión gzip para assets estáticos
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Assets estáticos: cache largo (tienen hash en el nombre)
    location ~* \.(js|css|woff2?|ttf|ico|png|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA routing: todas las rutas devuelven index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
